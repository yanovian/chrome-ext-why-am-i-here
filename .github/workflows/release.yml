name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build extension
        run: pnpm build

      - name: Package Chrome zip
        run: pnpm zip

      - name: Package Firefox zip
        run: pnpm zip:firefox

      - name: Locate release zips
        id: zips
        run: |
          chrome=$(ls .output/*-chrome.zip)
          firefox=$(ls .output/*-firefox.zip)
          echo "chrome=$chrome" >> "$GITHUB_OUTPUT"
          echo "firefox=$firefox" >> "$GITHUB_OUTPUT"
          test -f "$chrome"
          test -f "$firefox"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.zips.outputs.chrome }}
            ${{ steps.zips.outputs.firefox }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
