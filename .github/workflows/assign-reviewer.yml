name: Assign reviewer

# Assign a maintainer after CI passes on a pull request. Uses
# `pull_request_target` (not `workflow_run`) so this workflow is triggered only
# by PR activity — never by pushes to master — while still running with the base
# repository token (needed for fork PRs).
on:
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  assign:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const sha = pr.head.sha;
            const maxAttempts = 60;
            const delayMs = 30_000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'ci.yml',
                head_sha: sha,
                event: 'pull_request',
              });

              const run = data.workflow_runs
                .filter((r) => r.event === 'pull_request')
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

              if (!run) {
                core.info(`CI not started yet (attempt ${attempt}/${maxAttempts})`);
              } else if (run.status !== 'completed') {
                core.info(`CI in progress (run ${run.id}, attempt ${attempt}/${maxAttempts})`);
              } else if (run.conclusion === 'success') {
                core.info(`CI passed (run ${run.id})`);
                return;
              } else {
                core.info(`CI ${run.conclusion} (run ${run.id}); skipping assign.`);
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, delayMs));
            }

            core.warning('Timed out waiting for CI; skipping assign.');

      - name: Request maintainer review
        uses: actions/github-script@v7
        env:
          # Comma-separated GitHub usernames. Add maintainers here.
          MAINTAINERS: "prazian"
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });
            if (pr.state !== 'open') {
              core.info(`PR #${prNumber} is ${pr.state}; skipping.`);
              return;
            }
            if (pr.draft) {
              core.info(`PR #${prNumber} is a draft; skipping until it's ready for review.`);
              return;
            }

            const maintainers = (process.env.MAINTAINERS || '')
              .split(',').map((s) => s.trim()).filter(Boolean);
            if (maintainers.length === 0) {
              core.warning('No maintainers configured in MAINTAINERS.');
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner, repo, issue_number: prNumber, assignees: maintainers,
              });
              core.info(`Assigned: ${maintainers.join(', ')}`);
            } catch (e) {
              core.warning(`Could not assign: ${e.message}`);
            }

            const requested = new Set((pr.requested_reviewers || []).map((u) => u.login));
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner, repo, pull_number: prNumber,
            });
            const reviewed = new Set(reviews.map((r) => r.user?.login));
            const toRequest = maintainers.filter(
              (m) => m !== pr.user.login && !requested.has(m) && !reviewed.has(m),
            );

            if (toRequest.length === 0) {
              core.info(
                'No new reviewers to request (author is the only maintainer, or they were already requested/have reviewed).',
              );
              return;
            }
            try {
              await github.rest.pulls.requestReviewers({
                owner, repo, pull_number: prNumber, reviewers: toRequest,
              });
              core.info(`Requested review from: ${toRequest.join(', ')}`);
            } catch (e) {
              core.warning(`Could not request review: ${e.message}`);
            }
